<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Skill Fajar</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>

        body{
            background:
            radial-gradient(circle at top left,#2563eb,transparent 30%),
            radial-gradient(circle at bottom right,#0f172a,transparent 30%),
            #020617;
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            font-family:Arial;
            color:white;
        }

        .skill-box{
            width:400px;
            background:rgba(15,23,42,0.9);
            border-radius:25px;
            padding:40px 30px;
            text-align:center;
            backdrop-filter:blur(10px);
            box-shadow:0 0 30px rgba(0,0,0,0.4);
            border:1px solid rgba(255,255,255,0.1);
        }

        h1{
            margin-bottom:30px;
            font-weight:bold;
        }

        .skill{
            margin-bottom:20px;
            text-align:left;
        }

        .skill-name{
            margin-bottom:8px;
            font-size:15px;
        }

        .progress{
            height:20px;
            border-radius:20px;
            background:#111827;
        }

        .progress-bar{
            border-radius:20px;
            font-size:12px;
            line-height:20px;
        }

        .btn-back{
            margin-top:25px;
            display:inline-block;
            padding:10px 20px;
            background:#2563eb;
            color:white;
            text-decoration:none;
            border-radius:12px;
            transition:0.3s;
        }

        .btn-back:hover{
            background:#1d4ed8;
        }

    </style>

</head>
<body>

    <div class="skill-box">

        <h1>
            <i class="fas fa-magic"></i>
            My Skills
        </h1>

        <!-- HTML -->
        <div class="skill">
            <div class="skill-name">
                GFX Design
            </div>

            <div class="progress">
                <div class="progress-bar bg-danger" style="width:79%;">
                    79%
                </div>
            </div>
        </div>

        <!-- CSS -->
        <div class="skill">
            <div class="skill-name">
                Typography Editing
            </div>

            <div class="progress">
                <div class="progress-bar bg-primary" style="width:77%;">
                    77%
                </div>
            </div>
        </div>

        <!-- Bootstrap -->
        <div class="skill">
            <div class="skill-name">
                JJ Editing
            </div>

            <div class="progress">
                <div class="progress-bar bg-warningaasaazx" style="width:84%;">
                    84%
                </div>
            </div>
        </div>

<!-- Bootstrap -->
        <div class="skill">
            <div class="skill-name">
                Ads Editing
            </div>

            <div class="progress">
                <div class="progress-bar bg-info" style="width:65%;">
                    65%
                </div>
            </div>
        </div>

        
        <!-- Back -->
        <a href="index.html" class="btn-back">
            <i class="fa-solid fa-arrow-left"></i>
            Kembali
        </a>

    </div>

</body>
</html>
