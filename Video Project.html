<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Video</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            background:
            radial-gradient(circle at top left,#7c3aed,transparent 30%),
            radial-gradient(circle at bottom right,#0f172a,transparent 30%),
            #020617;

            min-height:100vh;

            font-family:Arial;
            color:white;

            padding:40px 20px;

            overflow-x:hidden;
        }

        .title{
            text-align:center;
            margin-bottom:40px;
        }

        .title h1{
            font-size:40px;
            font-weight:bold;
        }

        .title p{
            color:#cbd5e1;
        }

        /* NOTE */

        .note-box{
            margin-top:15px;

            display:flex;
            justify-content:center;
        }

        .note-content{

            background:rgba(124,58,237,0.15);

            border:1px solid rgba(255,255,255,0.1);

            color:#c4b5fd;

            padding:12px 18px;

            border-radius:15px;

            font-size:14px;

            max-width:500px;

            line-height:1.6;

            box-shadow:0 0 15px rgba(124,58,237,0.15);
        }

        /* GRID VIDEO */

        .project-box{
            max-width:1100px;
            margin:auto;

            display:grid;
            grid-template-columns:repeat(auto-fit, minmax(320px, 1fr));
            gap:25px;
            align-items:start;
        }

        .video-card{
            background:rgba(15,23,42,0.9);

            border-radius:20px;

            overflow:hidden;

            border:1px solid rgba(255,255,255,0.1);

            box-shadow:0 0 20px rgba(0,0,0,0.4);

            transition:0.3s;

            height:100%;

            display:flex;
            flex-direction:column;
        }

        .video-card:hover{
            transform:translateY(-5px);
        }

        video{
            width:100%;

            background:black;

            aspect-ratio:16/9;

            object-fit:contain;

            cursor:pointer;

            display:block;
        }

        .content{
            padding:20px;
        }

        .content h3{
            margin-bottom:10px;
            font-size:20px;
        }

        .back-wrapper{
            grid-column:1/-1;
            text-align:center;
            margin-top:10px;
        }

        .btn-back{
            display:inline-block;

            padding:12px 20px;

            background:#2563eb;

            color:white;

            text-decoration:none;

            border-radius:12px;

            transition:0.3s;
        }

        .btn-back:hover{
            background:#1d4ed8;
        }

        /* POPUP VIDEO */

        .popup{
            position:fixed;

            top:0;
            left:0;

            width:100%;
            height:100%;

            background:rgba(0,0,0,0.85);

            backdrop-filter:blur(6px);

            display:none;

            justify-content:center;
            align-items:center;

            z-index:9999;

            padding:20px;
        }

        /* CARD POPUP */

        .popup-card{

            width:100%;

            max-width:950px;

            background:#0f172a;

            border-radius:25px;

            padding:20px;

            border:1px solid rgba(255,255,255,0.1);

            box-shadow:
            0 0 40px rgba(0,0,0,0.7),
            0 0 20px rgba(124,58,237,0.2);

            position:relative;

            animation:popupShow 0.3s ease;
        }

        @keyframes popupShow{

            from{
                transform:scale(0.9);
                opacity:0;
            }

            to{
                transform:scale(1);
                opacity:1;
            }

        }

        /* VIDEO DI POPUP */

        .popup video{

            width:100%;

            max-height:80vh;

            border-radius:15px;

            background:black;

            object-fit:contain;

            display:block;
        }

        /* CLOSE BUTTON */

        .close-btn{

            position:absolute;

            top:10px;
            right:18px;

            font-size:35px;

            color:white;

            cursor:pointer;

            z-index:10;

            transition:0.3s;
        }

        .close-btn:hover{
            color:#a855f7;
            transform:rotate(90deg);
        }

    </style>

</head>
<body>

    <div class="title">

        <h1>
            <i class="fa-solid fa-video"></i>
            Project Video
        </h1>

        <p>
            My Project Videos
        </p>

        <!-- NOTE -->

        <div class="note-box">

            <div class="note-content">

                <i class="fa-solid fa-circle-info"></i>

                <b>Note:</b>
                Video JJ dan Typography hanyalah
                untuk senang-senang semata.

            </div>

        </div>

    </div>

    <div class="project-box">

        <!-- VIDEO 1 -->

        <div class="video-card">

            <div class="content">
                <h3>Typography</h3>
            </div>

            <video controls preload="metadata"
            onclick="openPopup('Typography.mp4')">

                <source src="Typography.mp4" type="video/mp4">

            </video>

        </div>

        <!-- VIDEO 2 -->

        <div class="video-card">

            <div class="content">
                <h3>JJ X Typography</h3>
            </div>

            <video controls preload="metadata"
            onclick="openPopup('Typography X JJ.mp4')">

                <source src="Typography X JJ.mp4" type="video/mp4">

            </video>

        </div>

        <!-- VIDEO 3 -->

        <div class="video-card">

            <div class="content">
                <h3>JJ Editing</h3>
            </div>

            <video controls preload="metadata"
            onclick="openPopup('JJ.mp4')">

                <source src="JJ.mp4" type="video/mp4">

            </video>

        </div>

        <!-- VIDEO 4 -->

        <div class="video-card">

            <div class="content">
                <h3>Ads Editing</h3>
            </div>

            <video controls preload="metadata"
            onclick="openPopup('Ads.mp4')">

                <source src="Ads.mp4" type="video/mp4">

            </video>

        </div>

        <!-- BACK -->

        <div class="back-wrapper">

            <a href="index.html" class="btn-back">

                <i class="fa-solid fa-arrow-left"></i>
                Kembali

            </a>

        </div>

    </div>

    <!-- POPUP VIDEO -->

    <div class="popup" id="popup">

        <div class="popup-card">

            <span class="close-btn"
            onclick="closePopup()">

                &times;

            </span>

            <video id="popupVideo" controls></video>

        </div>

    </div>

    <script>

        // pause video lain

        const videos = document.querySelectorAll("video");

        videos.forEach(video => {

            video.addEventListener("play", () => {

                videos.forEach(otherVideo => {

                    if(otherVideo !== video){
                        otherVideo.pause();
                    }

                });

            });

        });

        // popup video

        const popup = document.getElementById("popup");

        const popupVideo =
        document.getElementById("popupVideo");

        function openPopup(videoSrc){

            popup.style.display = "flex";

            popupVideo.src = videoSrc;

            popupVideo.play();
        }

        function closePopup(){

            popup.style.display = "none";

            popupVideo.pause();

            popupVideo.src = "";
        }

        // close popup jika klik luar card

        popup.addEventListener("click", function(e){

            if(e.target === popup){

                closePopup();

            }

        });

    </script>

</body>
</html>
