<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Fajar</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:
            radial-gradient(circle at top left,#2563eb,transparent 30%),
            radial-gradient(circle at bottom right,#0f172a,transparent 30%),
            #020617;
            font-family:Arial;
            color:white;
        }

        .card-box{
            width:380px;
            background:rgba(15,23,42,0.9);
            border:1px solid rgba(255,255,255,0.1);
            border-radius:25px;
            padding:40px 30px;
            text-align:center;
            backdrop-filter:blur(10px);
            box-shadow:0 0 30px rgba(0,0,0,0.4);
        }

        .profile{
            width:120px;
            height:120px;
            border-radius:50%;
            object-fit:cover;
            border:4px solid #3b82f6;
            margin-bottom:20px;
        }

        h1{
            font-size:32px;
            font-weight:bold;
        }

        .job{
            color:#60a5fa;
            margin-top:5px;
        }

        .menu{
            margin-top:30px;
        }

        .menu a{
            display:block;
            width:100%;
            margin-bottom:15px;
            padding:14px;
            border-radius:14px;
            background:#111827;
            color:white;
            text-decoration:none;
            font-size:16px;
            transition:0.3s;
        }

        .menu a:hover{
            background:#2563eb;
            transform:translateY(-3px);
        }

    </style>

</head>
<body>

    <div class="card-box">

        <img src="./profile.jpeg" class="profile">

        <h1>Fajar Alfarid</h1>

        <p class="job">
            Selamat Datang Di Portofolio Saya Silahkan Klik Di Bawah Ini Untuk Mengetahui Lebih Lanjut
        </p>

        <div class="menu">

            <!-- HTML -->
            <a href="html.html">
                <i class="fas fa-user"></i>
                My Description
            </a>

            <!-- CSS -->
            <a href="My Skill.html">
                <i class="fas fa-magic"></i>
                My SkillS
            </a>

            <!-- Laravel -->
            <a href="Video Project.html">
                <i class="fa-solid fa-video"></i>
                My Project Video
            </a>

            <!-- Bootstrap -->
            <a href="Project Desain.html">
                <i class="fa-solid fa-image"></i>
                My Project Design
            </a>

        </div>

    </div>

</body>
</html>
